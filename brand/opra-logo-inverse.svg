<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" fill="none">
  <!-- 
    Opra Logo — Classic Phantom Mask (Dark Background)
    
    White version for dark backgrounds.
    Mask: white fill, black eyeholes, red teardrop.
    Wordmark: white.
  -->

  <g transform="translate(0, 0)">

    <!-- ============================================ -->
    <!-- PHANTOM MASK ICON                            -->
    <!-- ============================================ -->

    <g transform="translate(40, 50)">

      <!-- MASK — fully white, defined by eyeholes -->
      <path d="
        M  8,12
        C  8,-2   18,-8   28,-4
        C 36,-2   40,-2   44,-4
        C 52,-8   64,-2   72,12
        C 76,20   72,30   64,36
        C 56,42   46,42   40,38
        C 34,42   24,42   16,36
        C  8,30    4,20    8,12
        Z
      " fill="#FFFFFF"/>

      <!-- Inner white shape (to give slight depth) -->
      <path d="
        M 11,13
        C 11,0   19,-5   28,-2
        C 36,0   40,0   44,-2
        C 52,-5   61,0   69,13
        C 73,20   69,28   62,34
        C 55,39   47,39   40,36
        C 33,39   25,39   18,34
        C 11,28    7,20   11,13
        Z
      " fill="#FFFFFF" opacity="0.85"/>

      <!-- Right eyehole -->
      <path d="
        M 48,8
        C 52,2   62,4    68,10
        C 70,14   68,20   62,22
        C 56,24   50,20   48,14
        C 46,10   46,10   48,8
        Z
      " fill="#000000"/>

      <!-- Left eyehole -->
      <path d="
        M 16,10
        C 18,4   24,4    28,8
        C 30,12   28,18   24,20
        C 20,22   16,18   16,12
        C 14,10   14,10   16,10
        Z
      " fill="#000000" opacity="0.2"/>

      <!-- RED TEARDROP -->
      <path d="
        M 64,26
        C 64,30   66,36   66,40
        C 66,46   62,50   58,50
        C 54,50   50,46   50,42
        C 50,38   54,36   58,36
        C 60,36   62,37   63,39
        C 63,35   63,30   63,26
        Z
      " fill="#CC0000"/>

      <!-- Mask ribbons -->
      <path d="M 10,16 C 2,12  -4,16  -10,22" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.25"/>
      <path d="M 70,16 C 78,12  84,16  90,22" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.25"/>

    </g>

    <!-- ============================================ -->
    <!-- WORDMARK: "OPRA" — white                     -->
    <!-- ============================================ -->

    <g transform="translate(148, 50)">

      <!-- O -->
      <circle cx="16" cy="40" r="32" fill="none" stroke="#FFFFFF" stroke-width="8"/>

      <!-- P -->
      <rect x="60" y="8" width="10" height="64" fill="#FFFFFF" rx="2"/>
      <path d="M 70,8 H 92 C 108,8 114,20 114,36 C 114,52 108,64 92,64 H 70 Z" fill="#FFFFFF"/>
      <path d="M 70,20 H 90 C 100,20 104,28 104,36 C 104,44 100,52 90,52 H 70 Z" fill="none"/>

      <!-- R -->
      <rect x="126" y="8" width="10" height="64" fill="#FFFFFF" rx="2"/>
      <path d="M 136,8 H 158 C 174,8 180,20 180,36 C 180,52 174,64 158,64 H 136 Z" fill="#FFFFFF"/>
      <path d="M 136,20 H 156 C 166,20 170,28 170,36 C 170,44 166,52 156,52 H 136 Z" fill="none"/>
      <path d="M 158,50 L 186,72 H 170 L 144,50 Z" fill="#FFFFFF"/>

      <!-- A -->
      <path d="M 210,72 L 194,8 H 210 L 222,62 L 254,8 H 270 L 236,72 H 218 Z" fill="#FFFFFF"/>
      <rect x="204" y="42" width="50" height="10" fill="#FFFFFF" rx="2"/>

    </g>

    <!-- ============================================ -->
    <!-- TAGLINE                                      -->
    <!-- ============================================ -->

    <text x="148" y="165" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#FFFFFF" letter-spacing="4.5" opacity="0.5">YOU TALK. WE ACT.</text>

  </g>
</svg>