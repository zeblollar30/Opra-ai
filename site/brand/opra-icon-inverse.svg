<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Opra Icon — Phantom Mask-O (Dark Background / Inverse) -->

  <!-- Outer O -->
  <circle cx="100" cy="100" r="45" fill="#FFFFFF"/>

  <!-- Inner hollow -->
  <circle cx="100" cy="100" r="29" fill="#000000"/>

  <!-- Left eye -->
  <path d="
    M 82,94
    C 82,84  90,80   97,83
    C 97,83  90,93   85,99
    C 83,101 82,99   82,94
    Z
  " fill="#FFFFFF"/>

  <!-- Play arrow in left eye -->
  <polygon points="88,87 88,98 95,93" fill="#000000"/>

  <!-- Right eye -->
  <path d="
    M 118,94
    C 118,84  110,80  103,83
    C 103,83  110,93  115,99
    C 117,101 118,99  118,94
    Z
  " fill="#FFFFFF"/>

  <!-- Phantom teardrop -->
  <path d="
    M 112,103
    C 112,108  114,116 114,121
    C 114,129  108,133 100,133
    C  92,133   86,129  86,122
    C  86,116   92,114 100,114
    C 104,114  106,116 108,118
    C 108,112  108,107 108,103
    Z
  " fill="#FFFFFF"/>

  <!-- Mask ribbons -->
  <path d="M 53,96 C 42,92  30,98   20,106" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
  <path d="M 147,96 C 158,92  170,98  180,106" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
</svg>